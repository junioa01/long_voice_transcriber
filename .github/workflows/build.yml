name: Build Android APK

# This triggers the build automatically every time you push changes to the main branch,
# and also allows you to click a "Run workflow" button manually in the Actions tab.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Sets up the Gradle build system since we aren't uploading a Gradle wrapper
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Compiles the app into a debug APK
    - name: Build Debug APK
      run: gradle assembleDebug

    # Uploads the finished APK so you can download it from the GitHub Actions page
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VoiceTranscriber-APK
        path: app/build/outputs/apk/debug/app-debug.apk
